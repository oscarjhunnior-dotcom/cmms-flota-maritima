<script>
// ============================================================
//  CMMS APP - JavaScript Principal
// ============================================================

// ─── ESTADO GLOBAL ──────────────────────────────────────────
const APP = {
  currentPage: 'dashboard',
  data: {
    embarcaciones: [],
    sistemas: [],
    equipos: [],
    ordenes: [],
    fallas: [],
    certificados: [],
    combustible: [],
  stock: [],
  combustibleHist: [],
    kpis: [],
    planes: []
  },
  loading: false
};

const MESES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const MESES_FULL = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

// ─── INICIALIZACIÓN ──────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  startClock();
  loadUserInfo();
  initSystem();
});

function startClock() {
  const el = document.getElementById('topbarTime');
  function tick() {
    const now = new Date();
    el.textContent = now.toLocaleDateString('es-PE', { weekday:'short', day:'2-digit', month:'short' }) + ' ' +
      now.toLocaleTimeString('es-PE', { hour:'2-digit', minute:'2-digit' });
  }
  tick();
  setInterval(tick, 30000);
}

function loadUserInfo() {
  google.script.run
    .withSuccessHandler(u => {
      if (u) {
        document.getElementById('userName').textContent = u.nombre;
        document.getElementById('userAvatar').textContent = u.nombre.charAt(0).toUpperCase();
      }
    })
    .getUserInfo();
}

function initSystem() {
  showLoading();
  // Usar getSystemStatus (ligero) en lugar de inicializarSistema (pesado)
  // inicializarSistema solo se necesita la primera vez — usar desde el menu de Apps Script
  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        loadPage('dashboard');
        checkAlertas();
      } else if (res && res.error) {
        hideLoading();
        showToast('Error: ' + res.error, 'error');
      }
    })
    .withFailureHandler(function(err) {
      hideLoading();
      showToast('Error de conexión: ' + err.message, 'error');
    })
    .getSystemStatus();
}

function checkAlertas() {
  google.script.run
    .withSuccessHandler(res => {
      if (res && res.alertas && res.alertas.length > 0) {
        const badge = document.getElementById('alertBadge');
        document.getElementById('alertCount').textContent = res.alertas.length;
        badge.style.display = 'flex';
        APP.data.alertas = res.alertas;
      }
    })
    .verificarAlertas();
}

// ─── NAVEGACIÓN ─────────────────────────────────────────────
function showPage(page) {
  APP.currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  loadPage(page);
}

const PAGE_TITLES = {
  dashboard: 'Dashboard General',
  embarcaciones: 'Embarcaciones',
  equipos: 'Gestión de Equipos',
  'plan-mant': 'Plan de Mantenimiento',
  ordenes: 'Órdenes de Trabajo',
  fallas: 'Registro de Fallas',
  parametros: 'Formatos G-125 · G-126 · G-127',
  kpis: 'KPIs & Confiabilidad',
  criticidad: 'Matriz de Criticidad',
  disponibilidad: 'Disponibilidad de Flota',
  combustible: 'Control de Combustible',
  certificados: 'Certificados Estatutarios',
  alertas: 'Alertas del Sistema',
  stock: '📦 Stock de Repuestos',
  'combustible-diario': '⛽ Consumo Diario por Equipo'
};

function loadPage(page) {
  document.getElementById('pageTitle').textContent = PAGE_TITLES[page] || page;
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading-screen"><div class="loader-anchor">⚓</div><div class="loader-text">Cargando...</div></div>';

  const pages = {
    dashboard:      renderDashboard,
    embarcaciones:  renderEmbarcaciones,
    equipos:        renderEquipos,
    'plan-mant':    renderPlanMant,
    ordenes:        renderOrdenes,
    fallas:         renderFallas,
    parametros:     renderParametros,
    kpis:           renderKpis,
    criticidad:     renderCriticidad,
    disponibilidad: renderDisponibilidad,
    combustible:    renderCombustible,
    certificados:   renderCertificados,
    alertas:        renderAlertas,
    stock:          renderStock,
    'combustible-diario': renderCombustible
  };

  if (pages[page]) pages[page]();
  else content.innerHTML = '<div class="empty-state"><div class="icon">🔧</div><div>Página en construcción</div></div>';
}

function showLoading() {
  document.getElementById('content').innerHTML = '<div class="loading-screen"><div class="loader-anchor">⚓</div><div class="loader-text">Cargando...</div></div>';
}
function hideLoading() {}

// ─── DASHBOARD ───────────────────────────────────────────────
function renderDashboard() {
  google.script.run
    .withSuccessHandler(data => {
      if (!data || data.error) { showError(data && data.error); return; }
      const r = data.resumen;
      const content = document.getElementById('content');
      content.innerHTML = `
        <div class="cards-grid">
          ${statCard('🚢', 'Embarcaciones Activas', r.embarcacionesActivas + '/' + r.totalEmbarcaciones, 'Flota operativa', '')}
          ${statCard('⚠️', 'Fallas (año actual)', r.totalFallas, 'Registros en curso', 'danger')}
          ${statCard('📋', 'Órdenes Abiertas', r.otAbiertas, 'De ' + r.totalOTs + ' totales', 'warning')}
          ${statCard('📜', 'Certs. por Vencer', r.certsCriticos, r.certsVencidos + ' vencidos', r.certsVencidos > 0 ? 'danger' : 'warning')}
          ${statCard('⛽', 'Combustible (gal)', parseFloat(r.totalCombustible).toLocaleString(), 'S/ ' + parseFloat(r.totalCostoComb).toLocaleString(), 'teal')}
          ${statCard('✅', 'OTs Cerradas', r.otCerradas, 'Trabajos completados', 'success')}
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px">
          <div class="section">
            <div class="section-header">
              <span class="section-title">📊 Fallas por Embarcación (Año actual)</span>
            </div>
            <div class="section-body">
              ${renderBarChart(data.fallasPorEmb, 'danger')}
            </div>
          </div>
          <div class="section">
            <div class="section-header">
              <span class="section-title">📈 Fallas por Mes</span>
            </div>
            <div class="section-body">
              ${renderBarChartArray(data.fallasPorMes, MESES, 'warning')}
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-header">
            <span class="section-title">🚢 Estado de Flota</span>
            <button class="btn btn-primary btn-sm" onclick="showPage('embarcaciones')">Ver Detalle</button>
          </div>
          <div class="section-body">
            <div class="table-wrap">
              <table>
                <thead><tr><th>Embarcación</th><th>Código</th><th>Tipo</th><th>Centro</th><th>Estado</th><th>Acciones</th></tr></thead>
                <tbody>
                  ${data.embarcaciones.map(e => `
                    <tr>
                      <td><strong>${e.NOMBRE}</strong></td>
                      <td><code>${e.CODIGO}</code></td>
                      <td>${e.TIPO}</td>
                      <td>${e.CENTRO_MANT}</td>
                      <td><span class="badge ${e.ESTADO === 'ACTIVO' ? 'badge-success' : 'badge-danger'}">${e.ESTADO}</span></td>
                      <td>
                        <button class="btn btn-outline btn-sm" onclick="showPage('equipos')">Equipos</button>
                      </td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>
        </div>`;
    })
    .withFailureHandler(err => showError(err.message))
    .getDashboardData();
}

function statCard(icon, label, value, sub, type) {
  return `<div class="stat-card ${type}">
    <div class="stat-icon">${icon}</div>
    <div class="stat-label">${label}</div>
    <div class="stat-value">${value}</div>
    <div class="stat-sub">${sub}</div>
  </div>`;
}

function renderBarChart(obj, color) {
  const keys = Object.keys(obj);
  if (!keys.length) return '<div class="empty-state" style="padding:20px"><div class="icon">📊</div><div>Sin datos</div></div>';
  const max = Math.max(...Object.values(obj), 1);
  const colors = { danger:'#e53935', warning:'#fb8c00', info:'#0288d1', success:'#43a047' };
  const c = colors[color] || colors.info;
  return `<div class="chart-bars">${keys.map(k => {
    const pct = Math.round((obj[k]/max)*180);
    return `<div class="chart-bar-wrap">
      <div class="chart-bar-val">${obj[k]}</div>
      <div class="chart-bar" style="height:${pct}px;background:${c}" title="${k}: ${obj[k]}"></div>
      <div class="chart-bar-label">${k.length > 8 ? k.substring(0,7)+'…' : k}</div>
    </div>`;
  }).join('')}</div>`;
}

function renderBarChartArray(arr, labels, color) {
  const max = Math.max(...arr, 1);
  const colors = { danger:'#e53935', warning:'#fb8c00', info:'#0288d1', success:'#43a047' };
  const c = colors[color] || colors.info;
  return `<div class="chart-bars">${arr.map((v, i) => {
    const pct = Math.round((v/max)*180);
    return `<div class="chart-bar-wrap">
      <div class="chart-bar-val">${v||''}</div>
      <div class="chart-bar" style="height:${Math.max(pct,2)}px;background:${c}" title="${labels[i]}: ${v}"></div>
      <div class="chart-bar-label">${labels[i]}</div>
    </div>`;
  }).join('')}</div>`;
}

// ─── EMBARCACIONES ───────────────────────────────────────────
function renderEmbarcaciones() {
  google.script.run
    .withSuccessHandler(data => {
      APP.data.embarcaciones = data || [];
      const content = document.getElementById('content');
      content.innerHTML = `
        <div class="page-header">
          <h2>🚢 Gestión de Embarcaciones</h2>
          <button class="btn btn-primary" onclick="abrirFormEmbarcacion()">+ Nueva Embarcación</button>
        </div>
        <div class="section">
          <div class="section-body">
            <div class="table-wrap">
              <table>
                <thead><tr><th>ID</th><th>Nombre</th><th>Código</th><th>Tipo</th><th>Armador</th><th>Centro</th><th>Eslora (m)</th><th>Potencia (KW)</th><th>Estado</th></tr></thead>
                <tbody>
                  ${data.length ? data.map(e => `
                    <tr>
                      <td><code>${e.ID}</code></td>
                      <td><strong>${e.NOMBRE}</strong></td>
                      <td><span class="badge badge-navy">${e.CODIGO}</span></td>
                      <td>${e.TIPO}</td>
                      <td>${e.ARMADOR}</td>
                      <td>${e.CENTRO_MANT}</td>
                      <td>${e.ESLORA}</td>
                      <td>${e.POTENCIA_KW}</td>
                      <td><span class="badge ${e.ESTADO==='ACTIVO'?'badge-success':'badge-danger'}">${e.ESTADO}</span></td>
                    </tr>`).join('') : '<tr><td colspan="9"><div class="empty-state">Sin embarcaciones registradas</div></td></tr>'}
                </tbody>
              </table>
            </div>
          </div>
        </div>`;
    })
    .withFailureHandler(err => showError(err.message))
    .getEmbarcaciones();
}

// ─── EQUIPOS ─────────────────────────────────────────────────
function renderEquipos() {
  google.script.run
    .withSuccessHandler(embs => {
      APP.data.embarcaciones = embs || [];
      google.script.run
        .withSuccessHandler(eqs => {
          APP.data.equipos = eqs || [];
          google.script.run
            .withSuccessHandler(sis => {
              APP.data.sistemas = sis || [];
              buildEquiposPage();
            }).getSistemas();
        }).withFailureHandler(err => showError(err.message)).getEquipos(null);
    }).getEmbarcaciones();
}

function buildEquiposPage() {
  const content = document.getElementById('content');
  const embOptions = APP.data.embarcaciones.map(e => `<option value="${e.ID}">${e.NOMBRE}</option>`).join('');
  content.innerHTML = `
    <div class="page-header">
      <h2>⚙️ Gestión de Equipos</h2>
      <button class="btn btn-primary" onclick="abrirFormEquipo()">+ Nuevo Equipo</button>
    </div>
    <div class="filter-bar">
      <select class="form-control" id="filtroEmbEquipo" onchange="filtrarEquipos()">
        <option value="">Todas las embarcaciones</option>
        ${embOptions}
      </select>
      <select class="form-control" id="filtroSistemaEquipo" onchange="filtrarEquipos()">
        <option value="">Todos los sistemas</option>
        ${APP.data.sistemas.map(s => `<option value="${s.ID_SISTEMA}">${s.NOMBRE}</option>`).join('')}
      </select>
      <input type="text" class="form-control" id="buscarEquipo" placeholder="🔍 Buscar equipo..." oninput="filtrarEquipos()">
    </div>
    <div class="section">
      <div class="section-body">
        <div class="table-wrap" id="tablaEquipos">
          ${buildTablaEquipos(APP.data.equipos)}
        </div>
      </div>
    </div>`;
}

function buildTablaEquipos(data) {
  if (!data.length) return '<div class="empty-state"><div class="icon">⚙️</div><div>No hay equipos registrados</div></div>';
  return `<table>
    <thead><tr><th>ID</th><th>Embarcación</th><th>Sistema</th><th>Nombre</th><th>Tipo Insp.</th><th>Horómetro</th><th>Próx. Mant.</th><th>Estado</th><th>Criticidad</th><th>Acciones</th></tr></thead>
    <tbody>
      ${data.map(e => {
        const horasProx = parseFloat(e.PROX_MANT_HORAS) || 0;
        const horaAct = parseFloat(e.HOROMETRO_ACTUAL) || 0;
        const alertaHoras = horasProx > 0 && horaAct >= horasProx * 0.9;
        return `<tr>
          <td><code>${e.ID_EQUIPO}</code></td>
          <td>${e.ID_EMBARCACION}</td>
          <td>${e.ID_SISTEMA}</td>
          <td><strong>${e.NOMBRE_EQUIPO}</strong></td>
          <td><span class="badge badge-info">${e.TIPO_INSPECCION}</span></td>
          <td>${horaAct.toLocaleString()} h</td>
          <td class="${alertaHoras ? 'criticidad-high' : ''}">${horasProx > 0 ? horasProx.toLocaleString() + ' h' : '-'}</td>
          <td><span class="badge ${e.ESTADO==='OPERATIVO'?'badge-success':'badge-danger'}">${e.ESTADO||'OPERATIVO'}</span></td>
          <td><span class="${criticidadClass(e.CRITICIDAD)}">${e.CRITICIDAD||'-'}</span></td>
          <td>
            <button class="btn btn-outline btn-sm" onclick="editarEquipo('${e.ID_EQUIPO}')">✏️</button>
            <button class="btn btn-primary btn-sm" onclick="crearOTDesdeEquipo('${e.ID_EQUIPO}')">🔧 OT</button>
          </td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>`;
}

function filtrarEquipos() {
  const emb = document.getElementById('filtroEmbEquipo').value;
  const sis = document.getElementById('filtroSistemaEquipo').value;
  const bus = document.getElementById('buscarEquipo').value.toLowerCase();
  const filtrado = APP.data.equipos.filter(e =>
    (!emb || e.ID_EMBARCACION === emb) &&
    (!sis || e.ID_SISTEMA === sis) &&
    (!bus || e.NOMBRE_EQUIPO.toLowerCase().includes(bus))
  );
  document.getElementById('tablaEquipos').innerHTML = buildTablaEquipos(filtrado);
}

function abrirFormEquipo(datos) {
  const embs = APP.data.embarcaciones.map(e => `<option value="${e.ID}" ${datos&&datos.ID_EMBARCACION===e.ID?'selected':''}>${e.NOMBRE}</option>`).join('');
  const sis = APP.data.sistemas.map(s => `<option value="${s.ID_SISTEMA}" ${datos&&datos.ID_SISTEMA===s.ID_SISTEMA?'selected':''}>${s.NOMBRE}</option>`).join('');
  const tiposInsp = ['IV','IM','PR','CF','MP','MC','SOV','OVT'].map(t => `<option value="${t}" ${datos&&datos.TIPO_INSPECCION===t?'selected':''}>${t}</option>`).join('');

  openModal('⚙️ ' + (datos ? 'Editar' : 'Nuevo') + ' Equipo', `
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Embarcación <span>*</span></label>
        <select class="form-control" id="eq_emb">${embs}</select>
      </div>
      <div class="form-group">
        <label class="form-label">Sistema <span>*</span></label>
        <select class="form-control" id="eq_sis">${sis}</select>
      </div>
      <div class="form-group">
        <label class="form-label">Código Equipo</label>
        <input class="form-control" id="eq_codigo" value="${datos?.CODIGO_EQUIPO||''}">
      </div>
      <div class="form-group">
        <label class="form-label">Nombre Equipo <span>*</span></label>
        <input class="form-control" id="eq_nombre" value="${datos?.NOMBRE_EQUIPO||''}">
      </div>
      <div class="form-group">
        <label class="form-label">Marca</label>
        <input class="form-control" id="eq_marca" value="${datos?.MARCA||''}">
      </div>
      <div class="form-group">
        <label class="form-label">Modelo</label>
        <input class="form-control" id="eq_modelo" value="${datos?.MODELO||''}">
      </div>
      <div class="form-group">
        <label class="form-label">N° de Serie</label>
        <input class="form-control" id="eq_serie" value="${datos?.SERIE||''}">
      </div>
      <div class="form-group">
        <label class="form-label">Tipo de Inspección</label>
        <select class="form-control" id="eq_tipo_insp">${tiposInsp}</select>
      </div>
      <div class="form-group">
        <label class="form-label">Horómetro Actual (h)</label>
        <input class="form-control" type="number" id="eq_horom" value="${datos?.HOROMETRO_ACTUAL||0}">
      </div>
      <div class="form-group">
        <label class="form-label">Próx. Mant. (h)</label>
        <input class="form-control" type="number" id="eq_prox" value="${datos?.PROX_MANT_HORAS||0}">
      </div>
      <div class="form-group">
        <label class="form-label">Criticidad (1-32)</label>
        <input class="form-control" type="number" id="eq_crit" min="1" max="32" value="${datos?.CRITICIDAD||1}">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarEquipoForm(${datos?`'${datos.ID_EQUIPO}'`:'null'})">💾 Guardar</button>
    </div>
  `);
}

function guardarEquipoForm(id) {
  const datos = {
    ID_EQUIPO: id || null,
    ID_EMBARCACION: document.getElementById('eq_emb').value,
    ID_SISTEMA: document.getElementById('eq_sis').value,
    CODIGO_EQUIPO: document.getElementById('eq_codigo').value,
    NOMBRE_EQUIPO: document.getElementById('eq_nombre').value,
    MARCA: document.getElementById('eq_marca').value,
    MODELO: document.getElementById('eq_modelo').value,
    SERIE: document.getElementById('eq_serie').value,
    TIPO_INSPECCION: document.getElementById('eq_tipo_insp').value,
    HOROMETRO_ACTUAL: parseFloat(document.getElementById('eq_horom').value) || 0,
    PROX_MANT_HORAS: parseFloat(document.getElementById('eq_prox').value) || 0,
    CRITICIDAD: parseInt(document.getElementById('eq_crit').value) || 1
  };
  if (!datos.ID_EMBARCACION || !datos.NOMBRE_EQUIPO) { showToast('Completa los campos obligatorios', 'error'); return; }
  google.script.run
    .withSuccessHandler(res => {
      if (res.success) { closeModal(); showToast(res.mensaje, 'success'); renderEquipos(); }
      else showToast(res.error || 'Error al guardar', 'error');
    }).guardarEquipo(datos);
}

function editarEquipo(id) {
  const eq = APP.data.equipos.find(e => e.ID_EQUIPO === id);
  if (eq) abrirFormEquipo(eq);
}

// ─── ÓRDENES DE TRABAJO ──────────────────────────────────────
function renderOrdenes() {
  google.script.run
    .withSuccessHandler(embs => {
      APP.data.embarcaciones = embs || [];
      google.script.run
        .withSuccessHandler(ots => {
          APP.data.ordenes = ots || [];
          buildOrdenesPage();
        }).getOrdenesTrabajoResumen();
    }).getEmbarcaciones();
}

function buildOrdenesPage() {
  const content = document.getElementById('content');
  const abiertasCount = APP.data.ordenes.filter(o => o.ESTADO === 'ABIERTA').length;
  const cerradasCount = APP.data.ordenes.filter(o => o.ESTADO === 'CERRADA').length;

  content.innerHTML = `
    <div class="page-header">
      <h2>📋 Órdenes de Trabajo</h2>
      <div style="display:flex;gap:8px">
        <button class="btn btn-warning" onclick="abrirFormOT('CORRECTIVO')">⚡ OT Correctiva</button>
        <button class="btn btn-primary" onclick="abrirFormOT('PREVENTIVO')">📅 OT Preventiva</button>
      </div>
    </div>
    <div class="cards-grid" style="grid-template-columns:repeat(4,1fr)">
      ${statCard('📋','Total OTs', APP.data.ordenes.length, 'Historial completo', '')}
      ${statCard('🔓','Abiertas', abiertasCount, 'En proceso', 'warning')}
      ${statCard('✅','Cerradas', cerradasCount, 'Completadas', 'success')}
      ${statCard('🚨','Vencidas', APP.data.ordenes.filter(o=>o.ESTADO==='ABIERTA'&&diasAbiertas(o.FECHA_REGISTRO)>30).length, 'Más de 30 días', 'danger')}
    </div>
    <div class="filter-bar">
      <select class="form-control" id="filtroOTEstado" onchange="filtrarOrdenes()">
        <option value="">Todos los estados</option>
        <option value="ABIERTA">ABIERTA</option>
        <option value="EN_PROCESO">EN PROCESO</option>
        <option value="CERRADA">CERRADA</option>
      </select>
      <select class="form-control" id="filtroOTTipo" onchange="filtrarOrdenes()">
        <option value="">Todos los tipos</option>
        <option value="PREVENTIVO">PREVENTIVO</option>
        <option value="CORRECTIVO">CORRECTIVO</option>
      </select>
      <input type="text" class="form-control" id="buscarOT" placeholder="🔍 Buscar OT o embarcación..." oninput="filtrarOrdenes()">
    </div>
    <div class="section">
      <div class="section-body">
        <div class="table-wrap" id="tablaOTs">
          ${buildTablaOTs(APP.data.ordenes)}
        </div>
      </div>
    </div>`;
}

function diasAbiertas(fecha) {
  if (!fecha) return 0;
  return Math.ceil((new Date() - new Date(fecha)) / (1000*60*60*24));
}

function buildTablaOTs(data) {
  if (!data.length) return '<div class="empty-state"><div class="icon">📋</div><div>No hay órdenes registradas</div></div>';
  return `<table>

function guardarOTForm() {
  const embEl = document.getElementById('ot_emb');
  const sisEl = document.getElementById('ot_sis');
  const eqEl = document.getElementById('ot_equipo');
  const desc = document.getElementById('ot_desc').value;
  if (!embEl.value || !sisEl.value || !desc) { showToast('Completa los campos obligatorios', 'error'); return; }

  const datos = {
    TIPO: document.getElementById('ot_tipo').value,
    ID_EMBARCACION: embEl.value,
    EMBARCACION: embEl.options[embEl.selectedIndex].text,
    ID_SISTEMA: sisEl.value,
    SISTEMA: sisEl.options[sisEl.selectedIndex].text,
    ID_EQUIPO: eqEl.value || '',
    EQUIPO: eqEl.value ? eqEl.options[eqEl.selectedIndex].text : '',
    DESCRIPCION: desc,
    ACCION: document.getElementById('ot_accion').value,
    PRIORIDAD: document.getElementById('ot_prioridad').value,

function renderParametros() {

  var tab = PM_STATE.tab;

    { id:'g127', icon:'📡', label:'G-127 Parámetros' },

    var bg  = active ? 'white' : 'transparent';

  content.innerHTML =

    + '<div id="pm-content"></div>';

  pmSwitch(tab);
}

function pmSwitch(tab) {
  PM_STATE.tab = tab;
  var tabs = ['g125','g126','g127'];
  for (var i = 0; i < tabs.length; i++) {
    var btn = document.getElementById('pmtab-' + tabs[i]);
    if (!btn) continue;
    var active = (tabs[i] === tab);
    btn.style.background = active ? 'white' : 'transparent';
    btn.style.color      = active ? '#1a3a5c' : 'rgba(255,255,255,.85)';
    btn.style.fontWeight = active ? '700' : '400';
  }
  var c = document.getElementById('pm-content');
  if (!c) return;
  if (tab === 'g125') { c.innerHTML = buildG125Form(); }
  else if (tab === 'g126') { c.innerHTML = buildG126Form(); }
  else { pmBuildG127(c); }
}

// Detectar tipo de equipo a partir del nombre
function g127DetectarTipo(nombreEquipo) {
  var n = nombreEquipo.toLowerCase();
  if (n.indexOf('motor principal') >= 0 || n.indexOf('propuls') >= 0) return 'MOTOR';
  if (n.indexOf('electrógeno') >= 0 || n.indexOf('electrogeno') >= 0 || n.indexOf('generador') >= 0) return 'GENERADOR';
  if (n.indexOf('hidráulico') >= 0 || n.indexOf('hidraulico') >= 0 ||
      n.indexOf('grúa') >= 0 || n.indexOf('grua') >= 0 ||
      n.indexOf('winche') >= 0 || n.indexOf('fondeo') >= 0 ||
      n.indexOf('timón') >= 0 || n.indexOf('timon') >= 0) return 'HIDRAULICO';
  if (n.indexOf('electrobomba') >= 0 || n.indexOf('motor eléctrico') >= 0 ||
      n.indexOf('motor electrico') >= 0 || n.indexOf('contraincendio') >= 0) return 'ELECTRICO';
  if (n.indexOf('ósmosis') >= 0 || n.indexOf('osmosis') >= 0) return 'OSMOSIS';
  return 'OTRO';
}

// Cargar equipos según embarcación seleccionada (desde G125_MATRIX)
function g127LoadEquipos() {
  var emb = document.getElementById('g127_emb').value;
  var sel = document.getElementById('g127_eq');
  var params = document.getElementById('g127_params');
  if (!sel) return;

  if (!emb) {
    sel.innerHTML = '<option value="">Seleccionar embarcación primero</option>';
    if (params) params.innerHTML = '<div style="text-align:center;padding:40px;color:#aaa"><div style="font-size:32px">⚙️</div><div style="font-size:13px;font-weight:600;margin-top:8px">Selecciona la embarcación</div></div>';
    return;
  }

  var grupos = G125_MATRIX[emb] || [];
  var html = '<option value="">— Seleccionar equipo —</option>';
  var lastSys = '';
  for (var i = 0; i < grupos.length; i++) {
    var g = grupos[i];
    if (g.sistema !== lastSys) {
      if (lastSys) html += '</optgroup>';
      html += '<optgroup label="' + g.sistema + '">';
      lastSys = g.sistema;
    }
    var tipo = g127DetectarTipo(g.equipo);
    html += '<option value="' + g.equipo + '" data-tipo="' + tipo + '">' + g.equipo + '</option>';
  }
  if (lastSys) html += '</optgroup>';
  sel.innerHTML = html;

  // Reset params
  if (params) params.innerHTML = '<div style="text-align:center;padding:30px;color:#aaa"><div style="font-size:12px">Selecciona el equipo para cargar sus parámetros</div></div>';
  var footer = document.getElementById('g127_footer');
  if (footer) footer.style.display = 'none';
}

// Generar campos de parámetros según tipo de equipo
function g127LoadParams() {
  var sel    = document.getElementById('g127_eq');
  var params = document.getElementById('g127_params');
  var footer = document.getElementById('g127_footer');
  if (!sel || !sel.value || !params) return;

  var eqNom  = sel.value;
  var tipo   = g127DetectarTipo(eqNom);
  var config = G127_TIPOS[tipo] || G127_TIPOS['OTRO'];

  var html = '<div style="margin-bottom:10px;display:flex;align-items:center;gap:8px">'
    + '<div style="background:#6a1b9a;color:white;font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px">' + config.label + '</div>'
    + '<div style="font-size:11px;color:#888">Los campos marcados con ⚠️ tienen rango de referencia</div>'
    + '</div>'
    + '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px">';

  for (var i = 0; i < config.params.length; i++) {
    var p = config.params[i];
    var hasRef = p.ref && p.ref.length > 0;
    html += '<div style="background:' + (hasRef ? '#f9f0ff' : '#fafafa') + ';border:1px solid ' + (hasRef ? '#ce93d8' : '#e0e0e0') + ';border-radius:8px;padding:10px 12px">';
    html += '<label style="font-size:10px;font-weight:700;color:#6a1b9a;text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:4px">';
    html += (hasRef ? '⚠️ ' : '') + p.label;
    if (p.unit) html += ' <span style="color:#aaa;font-weight:400">(' + p.unit + ')</span>';
    html += '</label>';

    if (p.tipo === 'select') {
      html += '<select id="g127p_' + p.id + '" class="form-control" style="font-size:12px;padding:6px 8px">';
      for (var j = 0; j < p.opts.length; j++) {
        html += '<option>' + p.opts[j] + '</option>';
      }
      html += '</select>';
    } else {
      html += '<input type="number" id="g127p_' + p.id + '" value="0" step="0.5" class="form-control" style="font-size:13px;padding:6px 8px">';
    }

    if (hasRef) html += '<div style="font-size:10px;color:#9c27b0;margin-top:3px">Referencia: ' + p.ref + '</div>';
    html += '</div>';
  }

  // Inspección visual siempre al final
  html += '<div style="background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:10px 12px">';
  html += '<label style="font-size:10px;font-weight:700;color:#f57f17;text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:4px">Inspección Visual</label>';
  html += '<select id="g127p_insp_vis" class="form-control" style="font-size:12px;padding:6px 8px"><option>OK</option><option>NO OK</option><option>N/A</option></select>';
  html += '</div>';

  // Observaciones full width
  html += '</div><div style="margin-top:10px">';
  html += '<label style="font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:4px">Observaciones</label>';
  html += '<textarea id="g127p_obs" rows="2" placeholder="Anomalías, ruidos, fugas, observaciones del turno..." class="form-control" style="font-size:13px;resize:vertical"></textarea>';
  html += '</div>';

  params.innerHTML = html;
  if (footer) footer.style.display = 'flex';

  // Cargar historial
  g127LoadHist();
}

// Guardar G-127
function g127Guardar() {
  var emb    = document.getElementById('g127_emb').value;
  var eq     = document.getElementById('g127_eq').value;
  var fecha  = document.getElementById('g127_fecha').value;
  var resp   = (document.getElementById('g127_resp').value || '').trim();
  var horom  = document.getElementById('g127_horom').value;
  var tipoI  = document.getElementById('g127_tipo').value;

  if (!emb)   { showToast('Selecciona la embarcación', 'error'); return; }
  if (!eq)    { showToast('Selecciona el equipo', 'error'); return; }
  if (!resp)  { showToast('Ingresa el nombre del responsable', 'error'); return; }
  if (!fecha) { showToast('Selecciona la fecha', 'error'); return; }

  // Recoger todos los campos de parámetros generados
  var tipo   = g127DetectarTipo(eq);
  var config = G127_TIPOS[tipo] || G127_TIPOS['OTRO'];
  var params = {};
  for (var i = 0; i < config.params.length; i++) {
    var p = config.params[i];
    var el = document.getElementById('g127p_' + p.id);
    if (el) params[p.id] = el.value;
  }
  var inspVis = (document.getElementById('g127p_insp_vis') || {value:''}).value;
  var obs     = (document.getElementById('g127p_obs') || {value:''}).value;

  var datos = {
    EMBARCACION:       emb,
    EQUIPO:            eq,
    TIPO_EQUIPO:       tipo,
    TIPO_INSPECCION:   tipoI,
    FECHA:             fecha,
    RESPONSABLE:       resp,
    HOROMETRO_ACTUAL:  horom,
    INSPECCION_VISUAL: inspVis,
    PARAMETROS:        JSON.stringify(params),
    OBSERVACION:       obs
  };

  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.success) {
        showToast('✅ G-127 registrado — ' + eq + ' · ' + emb, 'success');
        g127LoadHist();
        // Reset solo los campos numéricos
        var inputs = document.querySelectorAll('#g127_params input[type="number"]');
        for (var i = 0; i < inputs.length; i++) inputs[i].value = '0';
        document.getElementById('g127_horom').value = '0';
      } else {
        showToast((res && res.error) || 'Error al guardar', 'error');
      }
    })
    .withFailureHandler(function(err) { showToast(err.message, 'error'); })
    .registrarParametros(datos);
}

// Historial del equipo seleccionado
function g127LoadHist() {
  var el  = document.getElementById('g127_hist');
  var emb = (document.getElementById('g127_emb') || {value:''}).value;
  var eq  = (document.getElementById('g127_eq')  || {value:''}).value;
  if (!el || !emb || !eq) return;
  el.innerHTML = '<div style="color:#aaa;font-size:11px">Cargando...</div>';

  google.script.run
    .withSuccessHandler(function(rows) {
      if (!rows || !rows.length) {
        el.innerHTML = '<div style="color:#aaa;font-size:11px;font-style:italic">Sin registros previos para este equipo</div>';
        return;
      }
      var html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px">';
      var shown = rows.slice(-6).reverse();
      for (var i = 0; i < shown.length; i++) {
        var r = shown[i];
        var fecha = String(r.FECHA||'').substring(0,10);
        html += '<div style="border:1px solid #e1bee7;border-radius:8px;overflow:hidden">'
          + '<div style="background:#6a1b9a;color:white;padding:5px 10px;font-size:11px;display:flex;justify-content:space-between">'
          + '<span>📅 ' + fecha + '</span><span style="opacity:.75">' + (r.TIPO_INSPECCION||'') + '</span></div>'
          + '<div style="padding:6px 10px;font-size:11px;color:#555">'
          + '👤 ' + (r.RESPONSABLE||r.REGISTRADO_POR||'—') + '<br>'
          + '⏱ ' + (r.HOROMETRO_ACTUAL||'—') + ' h'
          + (r.INSPECCION_VISUAL ? '<br>👁 ' + r.INSPECCION_VISUAL : '')
          + '</div></div>';
      }
      el.innerHTML = html + '</div>';
    })
    .withFailureHandler(function() { if(el) el.innerHTML = '<div style="color:#e53935;font-size:11px">Error al cargar</div>'; })
    .getParametros({embarcacion: emb, equipo: eq, limit: 6});
}

function g125Load() {
  var emb  = document.getElementById('g125emb').value;
  var body = document.getElementById('g125body');
  var pie  = document.getElementById('g125pie');
  if (!body) return;

  if (!emb) {
    body.innerHTML = '<div style="text-align:center;padding:40px;color:#aaa"><div style="font-size:36px">🚢</div><div style="font-size:14px;font-weight:600;margin-top:8px">Selecciona la embarcación</div></div>';
    if (pie) pie.style.display = 'none';
    return;
  }

  var grupos = G125_MATRIX[emb];
  if (!grupos || !grupos.length) {
    body.innerHTML = '<div style="padding:30px;text-align:center;color:#aaa">Sin datos para ' + emb + '</div>';
    return;
  }

  // Agrupar por sistema
  var sistemas = {}, sysOrder = [];
  for (var gi = 0; gi < grupos.length; gi++) {
    var g = grupos[gi];
    if (!sistemas[g.sistema]) { sistemas[g.sistema] = []; sysOrder.push(g.sistema); }
    sistemas[g.sistema].push(g);
  }

  window._g125rows = [];
  var idx = 0;
  var html = '';

  for (var si = 0; si < sysOrder.length; si++) {
    var sysNom  = sysOrder[si];
    var eqs     = sistemas[sysNom];
    var cfg     = G125_SYS_COLORS[sysNom] || {bg:'#f5f5f5',hdr:'#555',icon:'🔩'};
    var sysId   = 'gs' + si;
    var totComp = 0;
    for (var ei = 0; ei < eqs.length; ei++) totComp += eqs[ei].componentes.length;

    html += '<div style="border-radius:10px;overflow:hidden;margin-bottom:6px;box-shadow:0 1px 4px rgba(0,0,0,.08)">';
    html += '<div onclick="g125Toggle('' + sysId + '')" '
      + 'style="background:' + cfg.hdr + ';color:white;padding:11px 16px;cursor:pointer;'
      + 'display:flex;justify-content:space-between;align-items:center">'
      + '<div style="display:flex;align-items:center;gap:8px">'
      + '<span style="font-size:18px">' + cfg.icon + '</span>'
      + '<div><div style="font-size:13px;font-weight:800">' + sysNom + '</div>'
      + '<div style="font-size:10px;opacity:.75">' + eqs.length + ' equipo(s) · ' + totComp + ' componentes</div></div></div>'
      + '<div style="display:flex;align-items:center;gap:10px">'
      + '<span style="font-size:10px;opacity:.75" id="' + sysId + 'p">0/' + totComp + '</span>'
      + '<span id="' + sysId + 'a" style="font-size:16px">' + (si === 0 ? '▼' : '▶') + '</span>'
      + '</div></div>';

    html += '<div id="' + sysId + '" style="display:' + (si === 0 ? 'block' : 'none') + ';background:' + cfg.bg + '">';

    for (var ei2 = 0; ei2 < eqs.length; ei2++) {
      var eq   = eqs[ei2];
      var eqId = sysId + 'e' + ei2;

      html += '<div style="background:' + cfg.hdr + '22;border-top:1px solid ' + cfg.hdr + '33;'
        + 'padding:7px 16px 7px 42px;display:flex;justify-content:space-between;align-items:center">'
        + '<div style="font-size:11px;font-weight:700;color:' + cfg.hdr + '">🔩 ' + eq.equipo + '</div>'
        + '<div style="display:flex;gap:4px">'
        + '<button onclick="g125MarkAll('' + eqId + '','OK')" style="padding:2px 8px;border:none;border-radius:10px;background:#e8f5e9;color:#2e7d32;font-size:10px;font-weight:700;cursor:pointer">✅ Todo OK</button>'
        + '<button onclick="g125MarkAll('' + eqId + '','N/A')" style="padding:2px 8px;border:none;border-radius:10px;background:#f5f5f5;color:#555;font-size:10px;font-weight:700;cursor:pointer">➖ N/A</button>'
        + '</div></div>';

      html += '<div style="display:grid;grid-template-columns:16px 1fr 80px 1fr 140px;gap:0;'
        + 'padding:3px 12px 2px 42px;background:' + cfg.hdr + '11;font-size:10px;color:#999;font-weight:700">'

function g125Toggle(id) {
  var el = document.getElementById(id);
  var ar = document.getElementById(id + 'a');
  if (!el) return;
  var open = el.style.display !== 'none';
  el.style.display = open ? 'none' : 'block';
  if (ar) ar.textContent = open ? '▶' : '▼';
}

function g125Set(rId, est, sysId) {
  var hid = document.getElementById(rId + 'est');
  var dot = document.getElementById(rId + 'dot');
  if (hid) hid.value = est;
  var dotCol = est==='OK'?'#4caf50':est==='PEN'?'#ff9800':est==='FALTA'?'#f44336':est==='N/A'?'#bbb':'#e0e0e0';
  if (dot) dot.style.background = dotCol;
  var clr = {
    'OK':   {id:'ok',bg:'#e8f5e9',bd:'#4caf50',cl:'#2e7d32'},
    'PEN':  {id:'pe',bg:'#fff8e1',bd:'#ffc107',cl:'#e65100'},
    'FALTA':{id:'fa',bg:'#fce4ec',bd:'#f44336',cl:'#c62828'},
    'N/A':  {id:'na',bg:'#f5f5f5',bd:'#bbb',   cl:'#555'}
  };
  ['ok','pe','fa','na'].forEach(function(b) {
    var btn = document.getElementById(rId + b);
    if (btn) { btn.style.background='white'; btn.style.borderColor='#ddd'; btn.style.color='#aaa'; }
  });
  var c = clr[est];
  if (c) {
    var btn2 = document.getElementById(rId + c.id);
    if (btn2) { btn2.style.background=c.bg; btn2.style.borderColor=c.bd; btn2.style.color=c.cl; }
  }
  g125UpdProg(sysId);
}

function g125MarkAll(eqId, est) {
  if (!window._g125rows) return;
  for (var i = 0; i < window._g125rows.length; i++) {
    if (window._g125rows[i].eqId === eqId) g125Set(window._g125rows[i].rId, est, window._g125rows[i].sysId);
  }
}

function g125UpdProg(sysId) {
  if (!window._g125rows) return;
  var sysRows  = [], total = window._g125rows.length, done = 0;
  for (var i = 0; i < window._g125rows.length; i++) {
    var r = window._g125rows[i];
    var v = document.getElementById(r.rId + 'est');
    var val = v ? v.value : '';
    if (r.sysId === sysId) sysRows.push(val);
    if (val) done++;
  }
  var sysDone = sysRows.filter(function(v){ return v; }).length;
  var sysPt = document.getElementById(sysId + 'p');
  if (sysPt) sysPt.textContent = sysDone + '/' + sysRows.length;
  var pct = total > 0 ? Math.round(done/total*100) : 0;
  var pctEl = document.getElementById('g125pct');
  var cntEl = document.getElementById('g125cnt');
  var barEl = document.getElementById('g125bar');
  if (pctEl) pctEl.textContent = pct + '%';
  if (cntEl) cntEl.textContent = done + ' / ' + total;
  if (barEl) { barEl.style.width = pct + '%'; barEl.style.background = pct>=80?'#4caf50':pct>=50?'#ff9800':'#f44336'; }
}

function g125Save() {
  var emb   = document.getElementById('g125emb').value;
  var resp  = (document.getElementById('g125resp').value || '').trim();
  var fecha = document.getElementById('g125fecha').value;
  var bita  = (document.getElementById('g125bita') || {value:''}).value || '';
  if (!emb)  { showToast('Selecciona la embarcación','error'); return; }
  if (!resp) { showToast('Ingresa el responsable','error'); return; }
  if (!fecha){ showToast('Selecciona la fecha','error'); return; }
  if (!window._g125rows || !window._g125rows.length) { showToast('Carga los sistemas primero','error'); return; }

  var regs = [];
  for (var i = 0; i < window._g125rows.length; i++) {
    var r    = window._g125rows[i];
    var est  = (document.getElementById(r.rId+'est') || {value:''}).value || '';
    var obs  = (document.getElementById(r.rId+'o')   || {value:''}).value || '';
    var hrs  = parseFloat((document.getElementById(r.rId+'h') || {value:r.hRef}).value) || r.hRef;
    if (est || obs) regs.push({sistema:r.sistema, equipo:r.equipo, componente:r.comp, horasRef:r.hRef, horasRealizadas:hrs, estado:est, observacion:obs});
  }
  if (!regs.length) { showToast('Marca al menos un componente','error'); return; }

  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.error) { showToast(res.error,'error'); return; }
      showToast('✅ G-125 guardado — ' + regs.length + ' componentes · ' + emb, 'success');
      g125Hist();
    })
    .withFailureHandler(function(err) { showToast(err.message,'error'); })
    .guardarG125({fecha:fecha, embarcacion:emb, responsable:resp,
                  estadoGeneral:'EN PROCESO', observacionGeneral:bita, registros:regs});
}

function g125Hist() {
  var el  = document.getElementById('g125hist');
  var emb = (document.getElementById('g125emb') || {value:''}).value || '';
  if (!el) return;
  el.innerHTML = '<div style="color:#aaa;font-size:12px">Cargando...</div>';
  google.script.run
    .withSuccessHandler(function(rows) {
      if (!rows || !rows.length) { el.innerHTML = '<div style="color:#aaa;font-size:12px;font-style:italic">Sin registros para esta embarcación</div>'; return; }
      var sem = {};
      for (var i = 0; i < rows.length; i++) {
        var r = rows[i];
        var k = String(r.FECHA||'').substring(0,10) + '|' + (r.USUARIO||'');
        if (!sem[k]) sem[k] = {fecha:String(r.FECHA||'').substring(0,10), resp:r.USUARIO||'', obs:r.OBS_GENERAL||'', total:0, ok:0, pe:0, fa:0, na:0};
        sem[k].total++;
        if (r.ESTADO_COMP==='OK') sem[k].ok++;
        else if (r.ESTADO_COMP==='PEN') sem[k].pe++;
        else if (r.ESTADO_COMP==='FALTA') sem[k].fa++;
        else if (r.ESTADO_COMP==='N/A') sem[k].na++;
      }
      var items = Object.values(sem).sort(function(a,b){return b.fecha.localeCompare(a.fecha);}).slice(0,6);
      var html = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px">';
      for (var j = 0; j < items.length; j++) {
        var s = items[j];
        var pct = s.total>0 ? Math.round(s.ok/s.total*100) : 0;
        var col = pct>=80?'#4caf50':pct>=50?'#ff9800':'#f44336';
        html += '<div style="border-radius:8px;border:1px solid #e3f2fd;overflow:hidden">'
          + '<div style="background:#1565c0;color:white;padding:6px 10px">'
          + '<div style="display:flex;justify-content:space-between;font-size:11px"><span style="font-weight:700">📅 ' + s.fecha + '</span><span style="color:#f59e0b;font-weight:800">' + pct + '%</span></div>'
          + '<div style="font-size:10px;opacity:.7">👤 ' + (s.resp||'—') + '</div></div>'
          + '<div style="padding:7px 10px;background:#f8fbff">'
          + '<div style="display:flex;gap:4px;font-size:10px;margin-bottom:4px">'
          + '<span style="background:#e8f5e9;color:#2e7d32;padding:1px 5px;border-radius:6px">✅ ' + s.ok + '</span>'
          + '<span style="background:#fff8e1;color:#e65100;padding:1px 5px;border-radius:6px">⏳ ' + s.pe + '</span>'
          + '<span style="background:#fce4ec;color:#c62828;padding:1px 5px;border-radius:6px">❌ ' + s.fa + '</span>'
          + '<span style="background:#f5f5f5;color:#555;padding:1px 5px;border-radius:6px">➖ ' + s.na + '</span></div>'
          + '<div style="background:#e0e0e0;border-radius:3px;height:4px;overflow:hidden">'
          + '<div style="height:100%;width:' + pct + '%;background:' + col + ';border-radius:3px"></div></div>'
          + (s.obs ? '<div style="margin-top:3px;font-size:10px;color:#888;font-style:italic">' + s.obs.substring(0,50) + (s.obs.length>50?'...':'') + '</div>' : '')
          + '</div></div>';
      }
      el.innerHTML = html + '</div>';
    })
    .withFailureHandler(function(){ if(el) el.innerHTML='<div style="color:#e53935;font-size:11px">Error al cargar</div>'; })
    .getG125({embarcacion: emb});
}

  var act  = parseFloat(document.getElementById(fid+'_act').value||0);
  var prox = document.getElementById(fid+'_prox');
  if (prox && act > 0 && !prox.value) prox.value = (act + 250).toFixed(0);
}

                        <div class="progress-fill" style="width:${parseFloat(k.disponibilidadNum*100).toFixed(0)}%;background:${parseFloat(k.disponibilidadNum)>=0.85?'#43a047':parseFloat(k.disponibilidadNum)>=0.7?'#fb8c00':'#e53935'}"></div>
                      </div>
                      <strong style="color:${parseFloat(k.disponibilidadNum)>=0.85?'#43a047':parseFloat(k.disponibilidadNum)>=0.7?'#fb8c00':'#e53935'}">${k.disponibilidad}</strong>
                    </div>
                  </td>
                  <td>${k.probFalla}</td>
                  <td>${k.mantenibilidad}</td>
                  <td><span class="${criticidadClass(k.criticidad)}">${k.criticidad}</span></td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
    })
    .withFailureHandler(err => { document.getElementById('kpiResults').innerHTML = '<div class="empty-state">Error: ' + err.message + '</div>'; })
    .calcularKPIs(embId, parseInt(ano));
}

function renderDisponibilidad() {
  google.script.run
    .withSuccessHandler(data => {
      const content = document.getElementById('content');
      if (!data) { content.innerHTML = '<div class="empty-state">Sin datos</div>'; return; }
      const promedio = data.length ? (data.reduce((s,d) => s + parseFloat(d.disponibilidad), 0) / data.length).toFixed(1) : 0;
      content.innerHTML = `
        <div class="page-header"><h2>📉 Disponibilidad Operativa de Flota</h2></div>
        <div class="cards-grid" style="margin-bottom:20px">
          ${statCard('📊','Disponibilidad Promedio', promedio + '%', 'Flota completa', parseFloat(promedio)>=85?'success':parseFloat(promedio)>=70?'warning':'danger')}
          ${statCard('✅','Embarcaciones BUENA', data.filter(d=>d.estado==='BUENA').length, '≥ 85%', 'success')}
          ${statCard('⚠️','Embarcaciones REGULAR', data.filter(d=>d.estado==='REGULAR').length, '70-84%', 'warning')}
          ${statCard('🚨','Embarcaciones CRÍTICA', data.filter(d=>d.estado==='CRITICA').length, '< 70%', 'danger')}
        </div>
        <div class="section">
          <div class="section-body">
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px">
              ${data.map(d => {
                const pct = parseFloat(d.disponibilidad);
                const color = pct>=85?'#43a047':pct>=70?'#fb8c00':'#e53935';
                return `<div class="disp-gauge">
                  ${svgGauge(pct, color)}
                  <div class="disp-name">${d.nombre}</div>
                  <div class="disp-pct" style="color:${color}">${d.disponibilidad}%</div>
                  <div class="disp-status"><span class="badge ${d.estado==='BUENA'?'badge-success':d.estado==='REGULAR'?'badge-warning':'badge-danger'}">${d.estado}</span></div>
                  <small style="color:var(--gray-400)">${d.numFallas} fallas · ${d.diasFop} días fop</small>
                </div>`;
              }).join('')}
            </div>
          </div>
        </div>`;
    })
    .withFailureHandler(err => showError(err.message))
    .getDisponibilidadFlota();
}

function svgGauge(pct, color) {
  const r = 40, cx = 60, cy = 60;
  const circumference = Math.PI * r;
  const offset = circumference - (pct / 100) * circumference;
  return `<svg width="120" height="70" viewBox="0 0 120 70">
    <path d="M 20 60 A 40 40 0 0 1 100 60" fill="none" stroke="#ecf2fa" stroke-width="10"/>
    <path d="M 20 60 A 40 40 0 0 1 100 60" fill="none" stroke="${color}" stroke-width="10"
      stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"
      style="transform-origin:60px 60px;transform:rotate(0deg)"/>
    <text x="60" y="58" text-anchor="middle" font-size="14" font-weight="800" fill="${color}">${pct}%</text>
  </svg>`;
}

function buildTablaStock(items) {
  if (!items.length) return '<div class="empty-state"><div class="icon">📦</div><div>Sin ítems que coincidan</div></div>';

  // Agrupar por CLAVE para mostrar ítem + todas sus ubicaciones juntas
  const porClave = {};
  const orden    = [];
  items.forEach(it => {
    const k = it.clave || it.id;
    if (!porClave[k]) { porClave[k] = []; orden.push(k); }
    porClave[k].push(it);
  });

  let html = `<table>
    <thead>
      <tr>
        <th>Clave</th>
        <th>Descripción</th>
        <th style="text-align:center">Stock total</th>
        <th style="text-align:center">Mínimo</th>
        <th>Unidad</th>
        <th>Familia</th>
        <th>Distribución por ubicación</th>
        <th style="text-align:center">Acciones</th>
      </tr>
    </thead>
    <tbody>`;

  orden.forEach(k => {
    const filas   = porClave[k];
    const stockTot = filas.reduce((s, f) => s + f.stockActual, 0);
    const mini     = filas[0].stockMinimo;
    const alerta   = mini > 0 && stockTot <= mini;
    const ubics    = filas.filter(f => f.stockActual > 0);

    // Distribución: una pastilla por ubicación con su cantidad
    const distHtml = ubics.length
      ? ubics.map(f => `
          <span style="display:inline-flex;align-items:center;gap:4px;background:${f.ubicacion==='ALMACEN CHIMBOTE'?'#e3f2fd':'#e8f5e9'};
            border-radius:6px;padding:2px 8px;margin:2px;font-size:12px">
            <b>${f.ubicacion.replace('ALMACEN CHIMBOTE','ALMACÉN')}</b>:
            <span style="font-weight:bold;color:${f.stockActual>0?'#1a3a5c':'#e53935'}">${f.stockActual}</span>
          </span>`).join('')
      : '<span style="color:#aaa;font-size:12px">Sin stock</span>';

    html += `<tr style="${alerta ? 'background:#fff3f3' : ''}">
      <td><small style="color:#888">${filas[0].clave||'—'}</small></td>
      <td style="font-weight:500">${filas[0].descripcion}</td>
      <td style="text-align:center;font-weight:bold;font-size:16px;color:${alerta?'#e53935':stockTot>0?'#2e7d32':'#aaa'}">
        ${stockTot}
        ${alerta ? '<br><span style="background:#e53935;color:white;padding:1px 6px;border-radius:3px;font-size:10px">⚠ BAJO</span>' : ''}
      </td>
      <td style="text-align:center">${mini||'—'}</td>
      <td style="text-align:center"><small>${filas[0].unidad}</small></td>
      <td><small>${filas[0].familia}</small></td>
      <td>${distHtml}</td>
      <td style="text-align:center">
        <button class="btn btn-sm" style="background:#1a3a5c;color:white;font-size:11px;padding:3px 10px"
          onclick="abrirMovDesdeTabla('${filas[0].id}','${filas[0].descripcion.replace(/'/g,"\'")}','${filas[0].ubicacion}','${filas[0].unidad}',${stockTot})">
          + Movimiento
        </button>
      </td>
    </tr>`;
  });

  html += '</tbody></table>';
  return html;
}

function filtrarStock() {
  const bus  = document.getElementById('stk-bus')?.value.toLowerCase() || '';
  const ubic = document.getElementById('stk-ubic')?.value || '';
  const fam  = document.getElementById('stk-fam')?.value  || '';
  const alerta = document.getElementById('stk-alerta')?.checked || false;
  let items = APP.data.stock || [];
  if (bus)   items = items.filter(i => i.descripcion.toLowerCase().includes(bus) || i.clave.toLowerCase().includes(bus));
  if (ubic)  items = items.filter(i => i.ubicacion === ubic);
  if (fam)   items = items.filter(i => i.familia === fam);
  if (alerta) items = items.filter(i => i.alerta);
  document.getElementById('stk-tabla').innerHTML = buildTablaStock(items);
}

function seleccionarTipoMov(tipo) {
  document.getElementById('mov-tipo-actual').value = tipo;
  const colores = { INGRESO:'#2e7d32', SALIDA:'#f57c00', TRASLADO:'#0288d1' };
  ['INGRESO','SALIDA','TRASLADO'].forEach(t => {
    const btn = document.getElementById('btn-tipo-'+t);
    if (t === tipo) {
      btn.style.border = '2px solid ' + colores[t];
      btn.style.background = colores[t] + '22';
      btn.style.color = colores[t];
    } else {
      btn.style.border = '2px solid #ccc';
      btn.style.background = '#fff';
      btn.style.color = '#555';
    }
  });
  document.getElementById('grupo-destino').style.display    = tipo==='TRASLADO' ? 'block' : 'none';
  document.getElementById('grupo-embarcacion').style.display = tipo==='SALIDA'   ? 'block' : 'none';
  // Label origen
  const lblOrigen = document.querySelector('#grupo-origen label');
  if (lblOrigen) lblOrigen.textContent = tipo==='INGRESO' ? 'Ubicación de ingreso' : 'Ubicación origen';
}

function mostrarSugerencias(items) {
  const sug = document.getElementById('mov-sugerencias');
  if (!items || !items.length) {
    sug.innerHTML = '<div style="padding:10px;color:#888;font-size:13px">Sin resultados</div>';
    sug.style.display = 'block';
    return;
  }
  sug.innerHTML = items.map(it => {
    const stockTotal = it.stockTotal || 0;
    const stockColor = stockTotal > 0 ? '#2e7d32' : '#e53935';
    return `<div onclick="seleccionarItemMov(${JSON.stringify(it).replace(/"/g,'&quot;')})"
      style="padding:10px 14px;cursor:pointer;border-bottom:1px solid #f0f0f0;hover:background:#f5f5f5"
      onmouseover="this.style.background='#f5f5f5'" onmouseout="this.style.background='white'">
      <div style="font-weight:600;font-size:13px">${it.descripcion}</div>
      <div style="font-size:11px;color:#888;margin-top:2px">
        ${it.clave ? `<span style="background:#e3f2fd;padding:1px 5px;border-radius:3px;margin-right:6px">${it.clave}</span>` : ''}
        ${it.familia}
        <span style="float:right;font-weight:bold;color:${stockColor}">Stock: ${stockTotal} ${it.unidad}</span>
      </div>
    </div>`;
  }).join('');
  sug.style.display = 'block';
}

function seleccionarItemMov(item) {
  document.getElementById('mov-sugerencias').style.display = 'none';
  document.getElementById('mov-buscar-item').value = item.descripcion;
  document.getElementById('mov-id-item').value = item.id;

  // Mostrar ítem seleccionado con stock actual
  document.getElementById('mov-item-seleccionado').style.display = 'block';
  document.getElementById('mov-item-nombre').textContent = item.descripcion;
  document.getElementById('mov-item-info').textContent =
    (item.clave || '') + ' · ' + item.familia + ' · ' + item.ubicacion;
  document.getElementById('mov-item-stock').textContent = item.stockTotal;
  document.getElementById('mov-item-unidad').textContent = item.unidad;

  // Desglose por ubicación
  const detalle = item.saldoPorUbic || {};
  const detalleHtml = Object.entries(detalle).length
    ? Object.entries(detalle).map(([ub, cant]) =>
        `<span style="margin-right:10px"><b>${ub}</b>: ${cant} ${item.unidad}</span>`
      ).join('')
    : '<em>Sin movimientos registrados aún — ingresa el stock inicial</em>';
  // Mostrar distribución por ubicación
  const detalleEntries = Object.entries(detalle).filter(([,v])=>v>0);
  document.getElementById('mov-stock-detalle').innerHTML = detalleEntries.length
    ? detalleEntries.map(([ub,c]) =>
        `<span style="margin-right:10px;font-size:12px">
          <b>${ub.replace('ALMACEN CHIMBOTE','ALMACÉN')}</b>: ${c} ${item.unidad}
        </span>`).join('')
    : '<em style="color:#aaa">Sin stock registrado aún — registra un ingreso inicial</em>';

  // Pre-seleccionar ubicación origen
  if (item.ubicacion) {
    const sel = document.getElementById('mov-origen');
    for (let i=0; i<sel.options.length; i++) {
      if (sel.options[i].value === item.ubicacion) { sel.selectedIndex = i; break; }
    }
  }
}

function abrirMovDesdeTabla(id, descripcion, ubicacion, unidad, stockTotal) {
  mostrarPanelMovimiento();
  document.getElementById('mov-buscar-item').value = descripcion;
  document.getElementById('mov-id-item').value = id;
  document.getElementById('mov-item-seleccionado').style.display = 'block';
  document.getElementById('mov-item-nombre').textContent = descripcion;
  document.getElementById('mov-item-info').textContent = 'Ubicación principal: ' + ubicacion;
  document.getElementById('mov-item-stock').textContent = stockTotal;
  document.getElementById('mov-item-unidad').textContent = unidad;
  document.getElementById('mov-stock-detalle').innerHTML =
    '<em style="color:#888">Cargando distribución...</em>';
  // Cargar distribución actualizada desde el servidor
  google.script.run
    .withSuccessHandler(items => {
      const mismasClave = items.filter(i => i.clave === (id.startsWith('STK') ? items.find(x=>x.id===id)?.clave : id));
      const ubicsHtml = (mismasClave.length ? mismasClave : items.filter(i=>i.id===id))
        .filter(i => i.stockActual > 0)
        .map(i => `<span style="margin-right:10px;font-size:12px"><b>${i.ubicacion}</b>: ${i.stockActual} ${unidad}</span>`)
        .join('') || '<em style="color:#aaa">Sin stock registrado</em>';
      document.getElementById('mov-stock-detalle').innerHTML = ubicsHtml;
    })
    .getStockItems({ busqueda: descripcion.substring(0,15) });
  // Pre-seleccionar origen
  const sel = document.getElementById('mov-origen');
  for (let i=0; i<sel.options.length; i++) {
    if (sel.options[i].value === ubicacion) { sel.selectedIndex = i; break; }
  }
}

function guardarMovimientoStock() {
  const idItem = document.getElementById('mov-id-item').value;
  const tipo   = document.getElementById('mov-tipo-actual').value;
  const cant   = parseFloat(document.getElementById('mov-cantidad').value || 0);

  if (!idItem) { showToast('Selecciona un repuesto de la lista', 'error'); return; }
  if (!cant || cant <= 0) { showToast('Ingresa una cantidad válida mayor a 0', 'error'); return; }
  if (tipo==='TRASLADO' && !document.getElementById('mov-destino').value) {
    showToast('Selecciona la ubicación destino', 'error'); return;
  }

  const datos = {
    idItem, tipo, cantidad: cant,
    ubicacionOrigen:  document.getElementById('mov-origen').value,
    ubicacionDestino: document.getElementById('mov-destino')?.value || '',
    motivo:           document.getElementById('mov-motivo').value,
    otAsociada:       document.getElementById('mov-ot').value,
    embarcacion:      document.getElementById('mov-embarcacion')?.value || ''
  };

  const btn = document.getElementById('btn-guardar-mov');
  btn.disabled = true; btn.textContent = 'Guardando...';

  google.script.run
    .withSuccessHandler(res => {
      btn.disabled = false; btn.textContent = '💾 Guardar Movimiento';
      if (res.error) { showToast(res.error, 'error'); return; }
      showToast(res.mensaje, 'success');
      limpiarFormMovimiento();
      // Refrescar tabla de stock
      google.script.run
        .withSuccessHandler(items => {
          APP.data.stock = items;
          filtrarStock();
        }).getStockItems({});
    })
    .withFailureHandler(err => {
      btn.disabled = false; btn.textContent = '💾 Guardar Movimiento';
      showToast(err.message, 'error');
    })
    .registrarMovimientoStock(datos);
}

  COMB_STATE.tab = tab;

    const k = b.id.replace('tab-','');
    b.style.background = k===tab ? 'white' : 'transparent';
    b.style.color       = k===tab ? '#1a3a5c' : 'rgba(255,255,255,.8)';

  });

  else if (tab === 'equipos')      c.innerHTML = buildTabEquipos(d);

          const active = (i+1) === d.mesSel;
          return `
          <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:0;cursor:pointer;min-width:0"
            onclick="seleccionarMesComb(${i+1})" title="${m}: ${tot.toFixed(0)} gal ${d.anoSel} / ${totAnt.toFixed(0)} gal ${d.anoSel-1}">
            <div style="width:100%;display:flex;gap:1px;align-items:flex-end;height:100px;overflow:hidden">
              <div style="flex:1;background:${active?'#f59e0b':'#1a3a5c'};border-radius:2px 2px 0 0;height:${h1}%;min-height:${tot>0?2:0}px;max-height:100px;transition:.3s"></div>
              <div style="flex:1;background:#bbb;border-radius:2px 2px 0 0;height:${h2}%;min-height:${totAnt>0?2:0}px;max-height:100px"></div>
            </div>
          </div>`;
        }).join('')}
      </div>
      <div style="display:flex;gap:6px;position:absolute;bottom:0;left:4px;right:4px">
        ${MESES_LABEL.map((m,i) => {
          const active = (i+1) === d.mesSel;
          return `<div style="flex:1;text-align:center;font-size:9px;color:${active?'#f59e0b':'#888'};font-weight:${active?'bold':'normal'};min-width:0;overflow:hidden">${m}</div>`;
        }).join('')}
      </div>
    </div>
  </div>`;

  // Tabla resumen por embarcación
  const tabla = `
  <div style="background:white;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.08)">
    <h4 style="margin:0 0 12px">Resumen — ${diaLabel}</h4>
    <table style="width:100%;border-collapse:collapse;font-size:13px">
      <thead>
        <tr style="background:#1a3a5c;color:white">
          <th style="padding:8px 12px;text-align:left">Embarcación</th>
          <th style="padding:8px;text-align:center">Motor Principal</th>
          <th style="padding:8px;text-align:center">Generadores</th>
          <th style="padding:8px;text-align:center">Total ${d.diaSel?'Día':'Mes'}</th>
          <th style="padding:8px;text-align:center">Acumulado Total</th>
        </tr>
      </thead>
      <tbody>
        ${['GUANAY','PELICANO','DELFIN 11','DELFIN 12','ISLA CHINCHA'].map((emb,i) => {
          const cd   = d.consumoDia[emb]  || {};
          const gMes = d.consumoMes[emb]  || 0;
          const gAcum= d.acumulado[emb]   || 0;
          const gDia = cd.total           || 0;
          const gMot = cd.motorPrincipal  || 0;
          const gGen = cd.generadores     || 0;
          const val  = d.diaSel ? gDia : gMes;
          return `<tr style="background:${i%2?'#f9f9f9':'white'};border-bottom:1px solid #eee">
            <td style="padding:8px 12px;font-weight:bold;color:${COLORES_EMB[emb]}">${emb}</td>
            <td style="padding:8px;text-align:center">${gMot.toFixed(1)}</td>
            <td style="padding:8px;text-align:center">${gGen.toFixed(1)}</td>
            <td style="padding:8px;text-align:center;font-weight:bold">${val.toFixed(1)}</td>
            <td style="padding:8px;text-align:center;color:#888">${gAcum.toFixed(1)}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;

  return tarjetas + barChart + tabla;
}

function seleccionarMesComb(mes) {
  COMB_STATE.mes = mes;
  COMB_STATE.dia = null;
  const sel = document.getElementById('comb-sel-mes');
  if (sel) sel.value = mes;
  const selDia = document.getElementById('comb-sel-dia');
  if (selDia) selDia.value = '';
  cambiarFiltrosComb();
}

function actualizarTotalRegistro() {
  const emb  = document.getElementById('reg-emb')?.value;
  const eqs  = EQUIPOS_COMB_UI[emb] || [];
  const tot  = eqs.reduce((s,_,i) => s+(parseFloat(document.getElementById(`reg-gal-${i}`)?.value||0)),0);
  const el   = document.getElementById('reg-total');
  if (el) el.textContent = tot.toFixed(1) + ' gal';
}

function guardarRegistroCombustible() {
  const emb      = document.getElementById('reg-emb')?.value;
  const fecha    = document.getElementById('reg-fecha')?.value;
  const actividad= document.getElementById('reg-actividad')?.value || '';
  const obs      = document.getElementById('reg-obs')?.value || '';
  const stockEmb = parseFloat(document.getElementById('reg-stock-emb')?.value || 0);

  if (!emb)   { showToast('Selecciona una embarcación','error'); return; }
  if (!fecha) { showToast('Selecciona la fecha','error'); return; }

  const equipos   = EQUIPOS_COMB_UI[emb] || [];
  const registros = [];

  equipos.forEach((eq, i) => {
    const gal = parseFloat(document.getElementById(`reg-gal-${i}`)?.value || 0);
    const hor = parseFloat(document.getElementById(`reg-hor-${i}`)?.value || 0);
    if (gal > 0 || hor > 0)
      registros.push({
        fecha, embarcacion: emb,
        equipoNombre: eq.nombre, tipoEquipo: eq.tipo,
        galones: gal, horometro: hor,
        // Stock de la embarcación: solo en el primer equipo registrado
        stockActual: registros.length === 0 ? stockEmb : 0,
        actividad, observacion: obs
      });
  });

  // Si solo ingresaron stock sin consumo de equipos, registrar igualmente
  if (!registros.length && stockEmb > 0) {
    registros.push({
      fecha, embarcacion: emb,
      equipoNombre: 'EMBARCACION', tipoEquipo: 'STOCK',
      galones: 0, horometro: 0, stockActual: stockEmb,
      actividad, observacion: obs
    });
  }

  if (!registros.length) {
    showToast('Ingresa al menos un galón, horómetro o el stock actual','error');
    return;
  }

  google.script.run
    .withSuccessHandler(res => {
      if (res.error) { showToast(res.error, 'error'); return; }
      showToast(`✅ Consumo registrado para ${emb}`, 'success');
      // Limpiar campos de stock
      const stkEl = document.getElementById('reg-stock-emb');
      if (stkEl) stkEl.value = '';
      actualizarTotalRegistro();
      cargarHistorialRegistro(emb);
      // Refrescar datos del dashboard en segundo plano
      google.script.run
        .withSuccessHandler(data => { COMB_STATE.data = data; })
        .getDashboardCombustible({ ano: COMB_STATE.ano, mes: COMB_STATE.mes, dia: COMB_STATE.dia });
    })
    .withFailureHandler(err => showToast(err.message, 'error'))
    .registrarCombustibleDiario(registros);
}


function cargarHistorialRegistro(emb) {
  const el = document.getElementById('reg-historial');
  if (!el) return;
  el.innerHTML = '<div style="padding:12px;text-align:center;color:#aaa"><div style="font-size:20px">⏳</div>Cargando registros...</div>';
  google.script.run
    .withSuccessHandler(data => {
      const filtrado = (data||[]).filter(r => (r.EMBARCACION||'') === emb);
      if (!filtrado.length) {
        el.innerHTML = '<div style="padding:20px;text-align:center;color:#aaa"><div style="font-size:24px">📋</div><br>Sin registros para '+emb+'</div>';
        return;
      }

      // Agrupar por fecha y calcular totales + stock + horómetro por equipo
      const porFecha = {};
      filtrado.forEach(r => {
        const rawFecha = r.FECHA || r.fecha || '';
        const k = rawFecha instanceof Date
          ? rawFecha.toISOString().substring(0,10)
          : String(rawFecha).substring(0,10);
        if (!k || k === 'Invalid Date') return;
        if (!porFecha[k]) porFecha[k] = { fecha:k, totalGal:0, equipos:[] };
        porFecha[k].totalGal += Number(r.GALONES||0);
        porFecha[k].equipos.push({
          nombre:  r.EQUIPO       || '—',
          tipo:    r.TIPO_EQUIPO  || '',
          gal:     Number(r.GALONES     || 0),
          hor:     Number(r.HOROMETRO   || 0),
          stk:     Number(r.STOCK_ACTUAL|| 0),
          act:     r.ACTIVIDAD    || '',
          obs:     r.OBSERVACION  || ''
        });
      });

      // Ordenar fechas desc y tomar las 5 más recientes
      const fechas = Object.keys(porFecha).sort().reverse().slice(0,5);

      // Resaltar el día anterior
      const ayer = new Date(); ayer.setDate(ayer.getDate()-1);
      const ayerStr = ayer.toISOString().substring(0,10);

      el.innerHTML = fechas.map((k, idx) => {
        const f = porFecha[k];
        const esAyer = k === ayerStr;
        return `
        <div style="border-radius:8px;margin-bottom:8px;overflow:hidden;border:${esAyer?'2px solid #1a3a5c':'1px solid #eee'}">
          <!-- Cabecera fecha -->
          <div style="background:${esAyer?'#1a3a5c':'#f5f5f5'};color:${esAyer?'white':'#333'};
                      padding:8px 12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer"
               onclick="toggleDiaHistorial('hist-${idx}')">
            <span style="font-size:13px;font-weight:bold">
              ${esAyer?'📅 Ayer — ':''}${k}
              ${esAyer?'<span style="font-size:10px;background:#f59e0b;color:#000;padding:1px 6px;border-radius:8px;margin-left:6px">DÍA ANTERIOR</span>':''}
            </span>
            <span style="font-size:14px;font-weight:bold">${f.totalGal.toFixed(1)} gal ▾</span>
          </div>
          <!-- Detalle equipos -->
          <div id="hist-${idx}" style="display:${esAyer?'block':'none'};padding:8px">
            <table style="width:100%;border-collapse:collapse;font-size:11px">
              <thead>
                <tr style="background:#f0f4f8">
                  <th style="padding:4px 6px;text-align:left">Equipo</th>
                  <th style="padding:4px;text-align:center">Gal</th>
                  <th style="padding:4px;text-align:center">Horóm.</th>
                  <th style="padding:4px;text-align:center;color:#e8a000">Stock</th>
                </tr>
              </thead>
              <tbody>
                ${f.equipos.map(e => `
                  <tr style="border-bottom:1px solid #f5f5f5">
                    <td style="padding:4px 6px;color:${e.tipo==='MOTOR_PRINCIPAL'?'#1a3a5c':'#198754'}">
                      ${e.tipo==='MOTOR_PRINCIPAL'?'⚙️':'⚡'} ${e.nombre}
                    </td>
                    <td style="padding:4px;text-align:center;font-weight:bold">${e.gal.toFixed(1)}</td>
                    <td style="padding:4px;text-align:center;color:#555">${e.hor>0?e.hor.toFixed(1):'—'}</td>
                    <td style="padding:4px;text-align:center;color:#e8a000;font-weight:bold">${e.stk>0?e.stk.toFixed(1):'—'}</td>
                  </tr>`).join('')}
              </tbody>
            </table>
            ${f.equipos[0]?.act ? `<div style="margin-top:6px;font-size:11px;color:#555">📌 ${f.equipos[0].act}</div>` : ''}
            ${f.equipos[0]?.obs ? `<div style="margin-top:3px;font-size:11px;color:#888">📝 ${f.equipos[0].obs}</div>` : ''}
          </div>
        </div>`;
      }).join('') || '<div style="padding:16px;text-align:center;color:#aaa">Sin registros</div>';
    })
    .withFailureHandler(err => {
      const el2 = document.getElementById('reg-historial');
      if (el2) el2.innerHTML = '<div style="color:#e53935;font-size:12px;padding:8px">Error al cargar: '+err.message+'</div>';
    })
    .getCombustibleDiario({ embarcacion: emb });
}

function toggleDiaHistorial(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function buildTabEquipos(d) {
  const embs = ['GUANAY','PELICANO','DELFIN 11','DELFIN 12','ISLA CHINCHA'];
  return `
  <div style="display:flex;flex-direction:column;gap:16px">
    ${embs.map(emb => {
      const equiposData = d.porEquipo.filter(e => e.emb === emb);
      if (!equiposData.length) return `
        <div style="background:white;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.08)">

          <em style="color:#aaa;font-size:13px">Sin registros de consumo</em>
        </div>`;
      const totalEmb = equiposData.reduce((s,e)=>s+e.gal,0);
      const maxGal   = Math.max(...equiposData.map(e=>e.gal), 1);
      return `
      <div style="background:white;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.08)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">

          <span style="background:${COLORES_EMB[emb]};color:white;padding:3px 12px;border-radius:12px;font-size:13px;font-weight:bold">
            ${totalEmb.toFixed(1)} gal acumulado
          </span>
        </div>
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead>
            <tr style="background:#f5f5f5">
              <th style="padding:8px 10px;text-align:left">Equipo</th>
              <th style="padding:8px;text-align:center">Galones</th>
              <th style="padding:8px;text-align:center">Horas</th>
              <th style="padding:8px;text-align:center">Gal/Hr</th>
              <th style="padding:8px;text-align:left;width:35%">Distribución</th>
            </tr>
          </thead>
          <tbody>
            ${equiposData.map((e,i) => {
              const galHr = e.hor > 0 ? (e.gal/e.hor).toFixed(2) : '—';
              const pct   = Math.round(e.gal / maxGal * 100);
              const color = e.tipo==='MOTOR_PRINCIPAL' ? '#1a3a5c' : '#198754';
              return `<tr style="border-bottom:1px solid #f0f0f0">
                <td style="padding:8px 10px">
                  <span style="font-size:10px;color:${color};margin-right:4px">${e.tipo==='MOTOR_PRINCIPAL'?'⚙️':'⚡'}</span>
                  ${e.eq}
                </td>
                <td style="padding:8px;text-align:center;font-weight:bold">${e.gal.toFixed(1)}</td>
                <td style="padding:8px;text-align:center">${e.hor.toFixed(1)}</td>
                <td style="padding:8px;text-align:center">${galHr}</td>
                <td style="padding:8px">
                  <div style="background:#eee;border-radius:4px;height:8px;overflow:hidden">
                    <div style="background:${color};height:100%;width:${pct}%;border-radius:4px;transition:.3s"></div>
                  </div>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`;
    }).join('')}
  </div>`;
}

function buildTabActividades(d) {
  const embs = ['PELICANO','GUANAY','ISLA CHINCHA','DELFIN 11','DELFIN 12','CISTERNA 1','PANGA'];

  // Tabla de actividades existentes
  const actExistentes = d.actividadesMes || [];

  // Agrupar por actividad para mostrar totales
  const porActividad = {};
  actExistentes.forEach(r => {
    const act = r.ACTIVIDAD;
    const emb = r.EMBARCACION;
    if (!act || !emb) return;
    if (!porActividad[act]) porActividad[act] = {};
    porActividad[act][emb] = {
      horasNav: Number(r.HORAS_NAV||0),
      galones:  Number(r.GALONES||0),
      horasElec:Number(r.HORAS_ELEC||0)
    };
  });

  return `
  <div style="display:flex;flex-direction:column;gap:16px">

    <!-- RESUMEN ACTIVIDADES DEL MES -->
    <div style="background:white;border-radius:10px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h4 style="margin:0;color:#1a3a5c">
          📋 Actividades de Flota Marítima — ${d.mesMesLabel} ${d.anoSel}
        </h4>
        <button onclick="mostrarFormActividad()"
          style="background:#1a3a5c;color:white;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;font-size:13px">
          + Registrar Actividad
        </button>
      </div>

      ${actExistentes.length === 0
        ? '<div style="text-align:center;padding:30px;color:#aaa"><div style="font-size:32px">📋</div>Sin actividades registradas para este período</div>'
        : `<div style="overflow-x:auto">
           <table style="width:100%;border-collapse:collapse;font-size:12px;min-width:700px">
             <thead>
               <tr style="background:#1a3a5c;color:white">

                 return `<tr style="background:${i%2?'#f9f9f9':'white'};border-bottom:1px solid #eee">

function ocultarFormActividad() {
  const el = document.getElementById('form-actividad');

}

function guardarActividadFlota() {
  const datos = {
    embarcacion: document.getElementById('act-emb')?.value,
    actividad:   document.getElementById('act-tipo')?.value,
    mes:         document.getElementById('act-mes')?.value,
    ano:         document.getElementById('act-ano')?.value,
    horasNav:    document.getElementById('act-horas')?.value || 0,
    galones:     document.getElementById('act-gal')?.value   || 0,
    horasElec:   document.getElementById('act-helec')?.value || 0,
    observacion: document.getElementById('act-obs')?.value   || ''
  };
  if (!datos.embarcacion) { showToast('Selecciona la embarcación','error'); return; }
  if (!datos.actividad)   { showToast('Selecciona la actividad','error'); return; }

  google.script.run
    .withSuccessHandler(res => {
      if (res.error) { showToast(res.error,'error'); return; }
      showToast('✅ Actividad registrada correctamente','success');
      ocultarFormActividad();
      cambiarFiltrosComb();
    })
    .withFailureHandler(err => showToast(err.message,'error'))
    .registrarActividadFlota(datos);
}

// ─── UTILIDADES ──────────────────────────────────────────────
function criticidadClass(val) {
  const v = parseFloat(val) || 0;
  if (v >= 32) return 'criticidad-crit';
  if (v >= 16) return 'criticidad-high';
  if (v >= 8)  return 'criticidad-med';
  return 'criticidad-low';
}

function criticidadClassFull(nivel) {
  const map = { CRITICO:'criticidad-crit', ALTO:'criticidad-high', MEDIO:'criticidad-med', BAJO:'criticidad-low' };
  return map[nivel] || 'criticidad-low';
}

function showError(msg) {
  document.getElementById('content').innerHTML = `<div class="empty-state"><div class="icon">❌</div><div>Error: ${msg||'Desconocido'}</div></div>`;
}

function openModal(title, body) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

function showToast(msg, type='success') {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  const icons = { success:'✅', error:'❌', warning:'⚠️' };
  el.innerHTML = `<span>${icons[type]||'ℹ️'}</span><span>${msg}</span>`;
  wrap.appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transform='translateX(100%)'; el.style.transition='.3s'; setTimeout(() => el.remove(), 300); }, 3500);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

      <div><strong>Tipo:</strong> ${ot.TIPO}</div>
      <div><strong>Embarcación:</strong> ${ot.EMBARCACION}</div>
      <div><strong>Sistema:</strong> ${ot.SISTEMA}</div>
      <div><strong>Equipo:</strong> ${ot.EQUIPO||'-'}</div>
      <div><strong>Técnico:</strong> ${ot.TECNICO||'-'}</div>
      <div><strong>Prioridad:</strong> ${ot.PRIORIDAD}</div>
      <div><strong>Estado:</strong> ${ot.ESTADO}</div>
      <div><strong>Fecha Registro:</strong> ${ot.FECHA_REGISTRO}</div>
      <div><strong>Fecha Cierre:</strong> ${ot.FECHA_CIERRE||'-'}</div>
      <div style="grid-column:1/-1"><strong>Descripción:</strong><br>${ot.DESCRIPCION}</div>
      <div style="grid-column:1/-1"><strong>Observaciones:</strong><br>${ot.OBSERVACIONES||'-'}</div>
    </div>
  `);
}

function verFalla(id) {
  const f = APP.data.fallas.find(f => f.ID_FALLA === id);
  if (!f) return;
  openModal('⚠️ Detalle de Falla - ' + (f.CODIGO_FALLA||f.ID_FALLA), `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:13px">
      <div><strong>Código:</strong> ${f.CODIGO_FALLA||'-'}</div>
      <div><strong>Embarcación:</strong> ${f.UBICACION_TECNICA}</div>
      <div><strong>Sistema:</strong> ${f.SISTEMA}</div>
      <div><strong>Equipo:</strong> ${f.EQUIPO}</div>
      <div><strong>Severidad:</strong> ${f.SEVERIDAD||'-'}</div>
      <div><strong>Días Falla:</strong> ${f.TIEMPO_FALLA_DIAS}</div>
      <div><strong>Fecha Registro:</strong> ${f.FECHA_REGISTRO}</div>
      <div><strong>Reparado:</strong> ${f.EQUIPO_REPARADO||'NO'}</div>
      <div style="grid-column:1/-1"><strong>Descripción:</strong><br>${f.DESCRIPCION_FALLA}</div>
      <div style="grid-column:1/-1"><strong>Causa Raíz:</strong><br>${f.CAUSA_RAIZ||'-'}</div>
      <div style="grid-column:1/-1"><strong>Acción Tomada:</strong><br>${f.ACCION_TOMADA||'-'}</div>
    </div>
  `);
}
</script>
